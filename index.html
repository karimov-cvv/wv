<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11"Б" | Наша История</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f3f4f6;
            --accent-color: #ff4757;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 15px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Эффектные фоновые изображения (скрыты на мобилках) */
        .bg-photo {
            position: fixed;
            z-index: -1;
            opacity: 0.15;
            width: 240px;
            border: 4px solid #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .p2 { top: 10%; right: 2%; transform: rotate(12deg); }
        .p3 { top: 45%; left: 2%; transform: rotate(-8deg); }
        .p4 { bottom: 8%; right: 3%; transform: rotate(6deg); }

        @media (max-width: 768px) {
            .bg-photo { display: none; }
        }

        /* Окно авторизации */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .login-box h2 { margin-bottom: 20px; font-weight: 600; }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .login-box button:active { transform: scale(0.98); }

        /* Главный контейнер (скрыт до логина) */
        .main-content {
            max-width: 700px;
            margin: 0 auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        header {
            text-align: center;
            margin: 40px 0;
            padding: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        header p { color: #8a99ad; margin: 0; }

        /* Лента контента */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16/9; /* Измени на 9/16, если все видео строго вертикальные (TikTok стайл) */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Интерактивная панель под видео */
        .card-actions {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .author-info { font-weight: 500; font-size: 1.05rem; }

        .action-buttons { display: flex; gap: 15px; }

        .btn-action {
            background: none;
            border: none;
            color: #8a99ad;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s, transform 0.2s;
            padding: 5px;
        }
        .btn-action:hover { transform: scale(1.1); }
        .btn-action.liked { color: var(--accent-color); }

        /* Блок комментариев */
        .comment-section {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.15);
        }

        .comment-input-block {
            display: flex;
            gap: 10px;
        }

        .comment-input-block input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .btn-send {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 0 15px;
            border-radius: 12px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin: 60px 0 30px 0;
            color: #52637a;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <img src="bg2.jpg" class="bg-photo p2" alt="">
    <img src="bg3.jpg" class="bg-photo p3" alt="">
    <img src="bg4.jpg" class="bg-photo p4" alt="">

    <div id="login-overlay">
        <div class="login-box">
            <h2>🔐 Вход в Архив</h2>
            <input type="text" id="username" placeholder="Твой Никнейм / Имя" required>
            <input type="password" id="password" placeholder="Пароль класса" required>
            <button onclick="checkLogin()">Войти</button>
        </div>
    </div>

    <div class="container main-content" id="main-site">
        <header>
            <h1>✨ Хроники 11 "Б"</h1>
            <p>Наша общая история в моментах</p>
        </header>

        <div class="feed">
            <div class="card">
                <div class="video-wrapper">
                    <video controls playsinline preload="metadata">
                        <source src="vid2.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="card-actions">
                    <div class="author-info">🎬 Момент 2</div>
                    <div class="action-buttons">
                        <button class="btn-action" onclick="toggleLike(this)">❤️ <span class="count">0</span></button>
                    </div>
                </div>
                <div class="comment-section">
                    <div class="comment-input-block">
                        <input type="text" placeholder="Оставь воспоминание...">
                        <button class="btn-send" onclick="sendComment(this)">💬</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="video-wrapper">
                    <video controls playsinline preload="metadata">
                        <source src="vid7.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="card-actions">
                    <div class="author-info">🎬 Момент 7</div>
                    <div class="action-buttons">
                        <button class="btn-action" onclick="toggleLike(this)">❤️ <span class="count">0</span></button>
                    </div>
                </div>
                <div class="comment-section">
                    <div class="comment-input-block">
                        <input type="text" placeholder="Оставь воспоминание...">
                        <button class="btn-send" onclick="sendComment(this)">💬</button>
                    </div>
                </div>
            </div>

            </div>

        <footer>
            Создано с любовью для выпускников 11 "Б" ❤️
        </footer>
    </div>

    <script>
        // Простая проверка логина
        function checkLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(user !== "" && pass !== "") { 
                // Скрываем окно логина и показываем контент
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    const mainContent = document.getElementById('main-site');
                    mainContent.style.opacity = '1';
                    mainContent.style.pointerEvents = 'auto';
                }, 500);
            } else {
                alert("Пожалуйста, заполни оба поля!");
            }
        }

        // Интерактивный лайк
        function toggleLike(btn) {
            btn.classList.toggle('liked');
            let countSpan = btn.querySelector('.count');
            let currentCount = parseInt(countSpan.innerText);
            
            if(btn.classList.contains('liked')) {
                countSpan.innerText = currentCount + 1;
            } else {
                countSpan.innerText = currentCount - 1;
            }
        }

        // Имитация отправки комментария
        function sendComment(btn) {
            const input = btn.previousElementSibling;
            if(input.value.trim() !== "") {
                alert("Воспоминание сохранено локально: " + input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
